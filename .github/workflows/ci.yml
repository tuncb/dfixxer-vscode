name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  test:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-13
            label: macos-x64
          - os: macos-14
            label: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Unit tests
        run: npm run test:unit

      - name: Extension tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:extension

      - name: Extension tests (non-Linux)
        if: runner.os != 'Linux'
        run: npm run test:extension

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npm run package
